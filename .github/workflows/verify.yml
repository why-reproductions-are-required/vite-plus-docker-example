name: Verify docs examples

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Build and smoke-test Docker examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # The official ghcr.io/voidzero-dev/vite-plus image is not published yet,
      # so build the toolchain image the examples reference. Replace this with
      # `docker pull ghcr.io/voidzero-dev/vite-plus:1` once it is published.
      - name: Build Vite+ toolchain base image
        run: docker build -f base.Dockerfile -t ghcr.io/voidzero-dev/vite-plus:1 .

      - name: Build Vite+ toolchain base image (Alpine)
        run: docker build -f base.Dockerfile.alpine -t ghcr.io/voidzero-dev/vite-plus:1-alpine .

      - name: Build SSR example image
        run: docker build -t vp-ssr-example ./ssr

      - name: Smoke-test SSR example
        run: |
          cid=$(docker run -d -p 3000:3000 vp-ssr-example)
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 20); do
            if curl -fsS http://localhost:3000/ >/tmp/ssr.txt 2>/dev/null; then break; fi
            sleep 1
          done
          echo "Response:"; cat /tmp/ssr.txt
          grep -q "vite-plus docker SSR example OK" /tmp/ssr.txt
          # The runtime Node.js must match the pinned .node-version exactly.
          node_version=$(docker exec "$cid" /usr/local/bin/node --version)
          echo "Runtime Node.js: $node_version"
          test "$node_version" = "v$(cat ssr/.node-version)"

      - name: Build SSR (distroless) example image
        run: docker build -f ssr/Dockerfile.distroless -t vp-ssr-distroless ./ssr

      - name: Smoke-test SSR (distroless) example
        run: |
          cid=$(docker run -d -p 3001:3000 vp-ssr-distroless)
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 20); do
            if curl -fsS http://localhost:3001/ >/tmp/ssr-distroless.txt 2>/dev/null; then break; fi
            sleep 1
          done
          echo "Response:"; cat /tmp/ssr-distroless.txt
          grep -q "vite-plus docker SSR example OK" /tmp/ssr-distroless.txt
          # distroless has no shell; exec the node binary directly.
          node_version=$(docker exec "$cid" /usr/local/bin/node --version)
          echo "Runtime Node.js: $node_version"
          test "$node_version" = "v$(cat ssr/.node-version)"

      - name: Build SSR (Alpine) example image
        run: docker build -f ssr/Dockerfile.alpine -t vp-ssr-alpine ./ssr

      - name: Smoke-test SSR (Alpine) example
        run: |
          cid=$(docker run -d -p 3002:3000 vp-ssr-alpine)
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 20); do
            if curl -fsS http://localhost:3002/ >/tmp/ssr-alpine.txt 2>/dev/null; then break; fi
            sleep 1
          done
          echo "Response:"; cat /tmp/ssr-alpine.txt
          grep -q "vite-plus docker SSR example OK" /tmp/ssr-alpine.txt
          # Alpine runtime has no shell; exec the node binary directly.
          node_version=$(docker exec "$cid" /usr/local/bin/node --version)
          echo "Runtime Node.js: $node_version"
          test "$node_version" = "v$(cat ssr/.node-version)"

      - name: Build SPA example image
        run: docker build -t vp-spa-example ./spa

      - name: Smoke-test SPA example
        run: |
          cid=$(docker run -d -p 8080:80 vp-spa-example)
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 20); do
            if curl -fsS http://localhost:8080/ >/tmp/spa.html 2>/dev/null; then break; fi
            sleep 1
          done
          echo "Response:"; cat /tmp/spa.html
          grep -q "vp docker spa" /tmp/spa.html

      - name: Report image sizes
        if: always()
        run: |
          {
            echo "## Docker image sizes"
            echo ""
            echo "| Image | Role | Size |"
            echo "| --- | --- | --- |"
            printf '| `%s` | %s | %s |\n' \
              "ghcr.io/voidzero-dev/vite-plus:1" "toolchain (debian, build only)" \
              "$(docker images ghcr.io/voidzero-dev/vite-plus:1 --format '{{.Size}}' | head -1)"
            printf '| `%s` | %s | %s |\n' \
              "ghcr.io/voidzero-dev/vite-plus:1-alpine" "toolchain (alpine, build only)" \
              "$(docker images ghcr.io/voidzero-dev/vite-plus:1-alpine --format '{{.Size}}' | head -1)"
            printf '| `%s` | %s | %s |\n' \
              "vp-ssr-example" "SSR runtime (debian-slim)" \
              "$(docker images vp-ssr-example --format '{{.Size}}' | head -1)"
            printf '| `%s` | %s | %s |\n' \
              "vp-ssr-distroless" "SSR runtime (distroless)" \
              "$(docker images vp-ssr-distroless --format '{{.Size}}' | head -1)"
            printf '| `%s` | %s | %s |\n' \
              "vp-ssr-alpine" "SSR runtime (alpine/musl)" \
              "$(docker images vp-ssr-alpine --format '{{.Size}}' | head -1)"
            printf '| `%s` | %s | %s |\n' \
              "vp-spa-example" "SPA runtime (nginx)" \
              "$(docker images vp-spa-example --format '{{.Size}}' | head -1)"
          } | tee -a "$GITHUB_STEP_SUMMARY"
